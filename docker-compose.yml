version: '3.8'

services:
  moderation:
    build: .
    container_name: neomarket-moderation
    ports:
      - "${MODERATION_PORT:-8000}:8000"
    depends_on:
      moderation_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shared-network
    env_file:
      - .env

  moderation_db:
    image: postgres:16-alpine
    container_name: moderation-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moderation
    volumes:
      - moderation_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shared-network

volumes:
  moderation_postgres_data:

networks:
  shared-network:
    external: true
