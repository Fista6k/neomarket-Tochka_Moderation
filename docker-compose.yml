version: '3.8'

services:
  moderation:
    build: .
    container_name: neomarket-moderation
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - neomarket-network
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    container_name: moderation-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moderation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - neomarket-network

volumes:
  postgres_data:

networks:
  neomarket-network:
    driver: bridge
